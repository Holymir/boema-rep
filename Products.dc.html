<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box;}html,body{margin:0;background:#fff;overflow-x:hidden;max-width:100%;}
@media (max-width:860px){[style*="grid-template-columns"]{grid-template-columns:1fr !important;}[style*="repeat(4"]{grid-template-columns:repeat(2,1fr) !important;}h1{font-size:36px !important;line-height:1.05 !important;}h2{font-size:25px !important;line-height:1.12 !important;}}
@media (max-width:480px){[style*="repeat(4"]{grid-template-columns:1fr !important;}h1{font-size:30px !important;}}</style>
</helmet>
<div style="font-family:'IBM Plex Sans',sans-serif;color:#15181B;background:#fff;">
  <dc-import name="Header" active="products" hint-size="100%,112px"></dc-import>

  <!-- PAGE HEAD -->
  <section style="background:#15181B;color:#fff;">
    <div style="max-width:1280px;margin:0 auto;padding:62px 32px 66px;">
      <div style="display:flex;align-items:center;gap:10px;font-size:12.5px;color:#8A949A;margin-bottom:26px;">
        <a href="Index.dc.html" style="color:#8A949A;text-decoration:none;" style-hover="color:#fff;">{{ crumbHome }}</a>
        <span>/</span>
        <span style="color:#E00000;font-weight:600;">{{ crumbHere }}</span>
      </div>
      <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:48px;align-items:end;">
        <h1 style="font-family:'Archivo',sans-serif;font-weight:900;font-size:54px;line-height:0.98;letter-spacing:-0.02em;margin:0;text-wrap:balance;">{{ headTitle }}</h1>
        <p style="font-size:16.5px;line-height:1.7;color:#C9D0D4;margin:0;">{{ headSub }}</p>
      </div>
    </div>
  </section>

  <!-- CATALOG GRID -->
  <section style="max-width:1280px;margin:0 auto;padding:64px 32px 24px;">
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:2px;background:#E2E4E6;border:1px solid #E2E4E6;">
      <sc-for list="{{ products }}" as="p" hint-placeholder-count="6">
        <div style="background:#fff;display:grid;grid-template-columns:1fr 1fr;min-height:300px;">
          <div style="background-color:#D8DCDF;background-image:{{ p.bg }};background-size:cover;background-position:center;aspect-ratio:16/10;"></div>
          <div style="padding:34px 32px;display:flex;flex-direction:column;">
            <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.08em;color:#E00000;margin-bottom:12px;">{{ p.tag }}</div>
            <h2 style="font-family:'Archivo',sans-serif;font-weight:700;font-size:23px;margin:0 0 11px;line-height:1.1;">{{ p.title }}</h2>
            <p style="font-size:14px;line-height:1.6;color:#5A646B;margin:0 0 18px;">{{ p.desc }}</p>
            <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:auto;">
              <sc-for list="{{ p.specs }}" as="s" hint-placeholder-count="3">
                <span style="font-size:11.5px;font-weight:600;color:#3A4146;background:#F4F5F6;border:1px solid #E2E4E6;padding:5px 10px;">{{ s }}</span>
              </sc-for>
            </div>
            <a href="Contact.dc.html" style="margin-top:22px;color:#15181B;text-decoration:none;font-family:'Archivo',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:0.04em;text-transform:uppercase;border-bottom:2px solid #E00000;padding-bottom:4px;align-self:flex-start;" style-hover="color:#E00000;">{{ p.cta }}</a>
          </div>
        </div>
      </sc-for>
    </div>
  </section>

  <!-- CATALOGS / DOWNLOADS -->
  <section style="max-width:1280px;margin:0 auto;padding:72px 32px;">
    <div style="display:flex;align-items:center;gap:13px;margin-bottom:26px;">
      <span style="width:30px;height:2px;background:#E00000;"></span>
      <span style="font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#8A949A;">{{ dlEyebrow }}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:#E2E4E6;border:1px solid #E2E4E6;">
      <sc-for list="{{ downloads }}" as="d" hint-placeholder-count="3">
        <a href="#" style="background:#fff;padding:30px 28px;text-decoration:none;color:inherit;display:flex;align-items:center;justify-content:space-between;gap:20px;" style-hover="background:#F4F5F6;">
          <div>
            <h3 style="font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;margin:0 0 6px;">{{ d.title }}</h3>
            <span style="font-size:12.5px;color:#8A949A;">{{ d.meta }}</span>
          </div>
          <span style="width:40px;height:40px;background:#E00000;color:#fff;display:flex;align-items:center;justify-content:center;flex:none;font-size:18px;font-weight:800;">↓</span>
        </a>
      </sc-for>
    </div>
  </section>

  <!-- CTA -->
  <section style="background:#E00000;">
    <div style="max-width:1280px;margin:0 auto;padding:60px 32px;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap;">
      <h2 style="font-family:'Archivo',sans-serif;font-weight:900;font-size:34px;color:#fff;margin:0;max-width:640px;text-wrap:balance;">{{ ctaTitle }}</h2>
      <a href="Contact.dc.html" style="background:#fff;color:#E00000;text-decoration:none;font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.03em;text-transform:uppercase;padding:18px 32px;white-space:nowrap;" style-hover="background:#15181B;color:#fff;">{{ ctaBtn }}</a>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">

    ],
    dlEyebrow: "Каталози и брошури",
    downloads: [

      { title: "Брошура Ролкови пътеки", meta: "PDF · Масово производство" },
      { title: "Флаер PV-40 съединител", meta: "PDF · Прецизна техника" },
    ],
    ctaTitle: "Не намирате точното решение? Ще го проектираме за вас.",

      { tag: "CONVEYOR TECHNOLOGY", title: "Roller conveyors", desc: "Gravity and driven roller sections that speed up work processes and raise productivity.", specs: ["Gravity / driven", "Series production", "Modular sections"], cta: "Inquire", bg: IMG.roller },
      { tag: "LINEAR TECHNOLOGY", title: "Linear technology & PV-40", desc: "Precise linear positioning and the PV-40 precision connector for maximum accuracy with minimal installation.", specs: ["High precision", "Fast install", "PV-40"], cta: "Inquire", bg: IMG.pv40 },

      { tag: "SAFETY", title: "Protective fences & lifts", desc: "Modular guarding for machines and zones, plus BÖMA lifts for vertical transport.", specs: ["Guard fencing", "BÖMA lift", "Modular"], cta: "Inquire", bg: IMG.belt },
    ],

    downloads: [
      { title: "Modu-System catalog", meta: "PDF · Aluminum kit" },

      { title: "PV-40 connector flyer", meta: "PDF · Precision tech" },
    ],
    ctaTitle: "Can't find the exact solution? We'll engineer it for you.",
    ctaBtn: "Request a quote",
  },

class Component extends DCLogic {
  renderVals() {
    const lang = ((typeof localStorage !== "undefined" && localStorage.getItem("mpb_lang")) || "bg") === "en" ? "en" : "bg";
    return { ...PSTR[lang] };
  }
}
</script>
</body>
</html>
